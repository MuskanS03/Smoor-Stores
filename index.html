<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMOOR — Find a Store</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #691A09;
    --bg-dark: #4a1006;
    --bg-card: rgba(255,255,255,0.07);
    --bg-card-hover: rgba(255,255,255,0.13);
    --border: rgba(255,255,255,0.12);
    --border-hover: rgba(232,180,100,0.6);
    --gold: #E8B464;
    --gold-dark: #c8904a;
    --cream: #F5EAD0;
    --cream-muted: #c8b090;
    --text-sub: rgba(245,234,208,0.55);
    --pill-sig: rgba(232,180,100,0.15);
    --pill-sig-text: #E8B464;
    --pill-cafe: rgba(180,220,160,0.15);
    --pill-cafe-text: #a8d888;
    --pill-kiosk: rgba(180,200,240,0.15);
    --pill-kiosk-text: #a8c0e8;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* === HEADER === */
  .header {
    text-align: center;
    padding: 24px 24px 20px;
    position: relative;
  }

  .header::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 16px auto 0;
    opacity: 0.5;
  }

  .logo-wrap {
    width: 240px;
    height: 240px;
    margin: 0 auto -28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-wrap img {
    width: 240px;
    height: 240px;
    object-fit: contain;
    mix-blend-mode: lighten;
  }

  .tagline {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.3;
  }

  .subline {
    font-size: 13px;
    color: var(--text-sub);
    margin-top: 8px;
    letter-spacing: 0.3px;
  }


  /* === EXPERIENCE CENTRE CARD === */
  .exp-centre-card {
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    border: 0.5px solid var(--border);
    margin-bottom: 10px;
    cursor: pointer;
    position: relative;
    display: block;
    background: var(--bg-card);
    transition: border-color 0.15s;
  }
  .exp-centre-card:hover { border-color: var(--border-hover); }
  .exp-centre-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
  }
  .exp-centre-info {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
  }
  .exp-centre-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: rgba(0,0,0,0.25);
    border: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .exp-centre-text { flex: 1; min-width: 0; }
  .exp-centre-name { font-size: 14px; font-weight: 500; color: var(--cream); }
  .exp-centre-area { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

  /* === CITY TABS === */
  .city-nav {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding: 24px 16px 0;
    scrollbar-width: none;
  }
  .city-nav::-webkit-scrollbar { display: none; }

  .city-tab {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 7px 13px;
    font-size: 11px;
    letter-spacing: 0.3px;
    color: var(--cream-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }

  .city-tab:hover, .city-tab.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #1a0a00;
    font-weight: 500;
  }

  /* === CITY SECTION === */
  .city-section {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 16px;
    display: none;
  }

  .city-section.visible { display: block; }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 28px 0 14px;
  }

  .section-divider-line { flex: 1; height: 0.5px; background: var(--border); }

  .section-divider-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    white-space: nowrap;
  }

  /* === STORE BUTTON === */
  .store-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, border-color 0.15s;
    color: inherit;
    font-family: 'DM Sans', sans-serif;
  }

  .store-btn:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-hover);
  }

  .store-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(0,0,0,0.25);
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: -1px;
  }

  .store-info { flex: 1; min-width: 0; }

  .store-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .store-area {
    font-size: 11px;
    color: var(--text-sub);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .store-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }

  .type-pill {
    font-size: 9px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .pill-signature { background: var(--pill-sig); color: var(--pill-sig-text); border: 0.5px solid rgba(232,180,100,0.25); }
  .pill-cafe      { background: var(--pill-cafe); color: var(--pill-cafe-text); border: 0.5px solid rgba(168,216,136,0.25); }
  .pill-kiosk     { background: var(--pill-kiosk); color: var(--pill-kiosk-text); border: 0.5px solid rgba(168,192,232,0.25); }

  .store-arrow { font-size: 13px; color: var(--border); }

  /* === OVERLAY === */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,5,0,0.88);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .overlay.active { display: flex; animation: fadeIn 0.2s ease; }

  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes slideUp { from { transform:translateY(24px); opacity:0; } to { transform:translateY(0); opacity:1; } }

  .popup {
    background: #3a0e04;
    border: 0.5px solid rgba(232,180,100,0.2);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 520px;
    padding: 10px 20px 36px;
    animation: slideUp 0.25s ease;
  }

  .popup-handle {
    width: 36px; height: 4px;
    background: rgba(232,180,100,0.25);
    border-radius: 2px;
    margin: 0 auto 18px;
  }

  .popup-type { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }

  .popup-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--cream);
    margin-bottom: 16px;
    line-height: 1.2;
  }

  .popup-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 11px;
  }

  .popup-row-icon { color: var(--gold); margin-top: 1px; flex-shrink: 0; }
  .popup-row-icon svg { width: 14px; height: 14px; }

  .popup-row-text {
    font-size: 12.5px;
    color: var(--cream-muted);
    line-height: 1.6;
  }

  .popup-row-text strong { color: var(--cream); font-weight: 500; }

  .popup-actions { display: flex; gap: 10px; margin-top: 20px; }

  .popup-map {
    width: 100%;
    height: 180px;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 14px;
    border: 0.5px solid rgba(232,180,100,0.15);
    background: rgba(0,0,0,0.2);
    position: relative;
  }

  .popup-map iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .map-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-sub);
  }

  .btn-maps {
    flex: 1;
    background: var(--gold);
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #1a0800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    text-decoration: none;
    transition: background 0.15s;
  }

  .btn-maps svg { width: 15px; height: 15px; }
  .btn-maps:hover { background: #f0c878; }

  .btn-close {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-close:hover { background: rgba(255,255,255,0.07); color: var(--cream); }

  .footer {
    text-align: center;
    margin-top: 40px;
    padding-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }

  .footer a {
    color: rgba(245,234,208,0.35);
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer a:hover { color: var(--gold); }

  .footer-divider {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(245,234,208,0.2);
  }

  .footer-phone {
    display: flex;
    align-items: center;
    gap: 6px;
    color: rgba(245,234,208,0.35);
  }

  .footer-phone svg {
    width: 12px;
    height: 12px;
    opacity: 0.6;
  }
</style>
</head>

      <div class="popup-row-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>

    </div>

    <div class="popup-actions">
      <a class="btn-maps" id="p-link" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        Open in Google Maps
      </a>
      <button class="btn-close" onclick="close_popup()">Close</button>
    </div>
  </div>
</div>

<script>
function showCity(city, btn) {
  document.querySelectorAll('.city-section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.city-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('city-' + city).classList.add('visible');
  btn.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function open_store(name, type, hours, phone, mapsUrl, tier) {
  document.getElementById('p-name').textContent = name;
  document.getElementById('p-type').textContent = 'SMOOR ' + type;
  document.getElementById('p-hours').textContent = hours;
  document.getElementById('p-phone').textContent = phone;
  document.getElementById('p-link').href = mapsUrl;

  const mapIframe = document.getElementById('p-map');
  const mapLoading = document.getElementById('map-loading');
  mapLoading.style.display = 'flex';
  mapIframe.style.opacity = '0';

  let embedUrl = '';
  try {
    const url = new URL(mapsUrl);
    const pathname = url.pathname;
    const fullStr = pathname + url.search;

    // Decimal coords @lat,lng
    const coordMatch = fullStr.match(/@([-\d.]+),([-\d.]+)/);
    // ?q= param
    const qParam = url.searchParams.get('q');
    // /place/Name or /search/Name in path
    const placeMatch = pathname.match(/\/maps\/(place|search)\/([^\/\?@]+)/);

    if (coordMatch) {
      const lat = coordMatch[1], lng = coordMatch[2];
      embedUrl = `https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed&hl=en`;
    } else if (qParam) {
      embedUrl = `https://maps.google.com/maps?q=${encodeURIComponent(qParam)}&z=15&output=embed&hl=en`;
    } else if (placeMatch) {
      const query = decodeURIComponent(placeMatch[2]).replace(/\+/g,' ');
      embedUrl = `https://maps.google.com/maps?q=${encodeURIComponent('SMOOR ' + query)}&z=15&output=embed&hl=en`;
    } else {
      embedUrl = `https://maps.google.com/maps?q=${encodeURIComponent('SMOOR ' + name + ' Bengaluru India')}&z=15&output=embed&hl=en`;
    }
  } catch(e) {
    embedUrl = `https://maps.google.com/maps?q=${encodeURIComponent('SMOOR ' + name + ' India')}&z=15&output=embed&hl=en`;
  }

  mapIframe.onload = function() {
    mapLoading.style.display = 'none';
    mapIframe.style.opacity = '1';
    mapIframe.style.transition = 'opacity 0.3s ease';
  };
  mapIframe.src = embedUrl;

  document.getElementById('overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function close_popup() {
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
  // Clear iframe to stop loading when closed
  document.getElementById('p-map').src = '';
}

function close_on_bg(e) {
  if (e.target === document.getElementById('overlay')) close_popup();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') close_popup();
});
</script>
